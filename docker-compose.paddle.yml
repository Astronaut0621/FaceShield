services:
  backend:
    build:
      args:
        INSTALL_PADDLE: "true"
    environment:
      FACESHIELD_ALGORITHM_BACKEND: paddle
      FACESHIELD_MODEL_NAME: FaceShield-FusionV2
      FACESHIELD_MODEL_VERSION: fusion_v2-202607
      FACESHIELD_MODEL_PATH: /app/model/deploy/fusion_v2/best.pdparams
      FACESHIELD_MODEL_CONFIG_PATH: /app/model/deploy/fusion_v2/config.json
    volumes:
      - ./model:/app/model:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/mobile/bootstrap', timeout=10))['data']; assert data['algorithm']['backend'] == 'paddle' and data['algorithm']['ready'] is True",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
